version: 2
updates:
# Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    assignees:
      - "dyka3773"
    target-branch: "develop"
    groups:
      github-actions:
        patterns:
          - "*"